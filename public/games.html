<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseGames Library</title>
    <style>
        /* --- PREMIUM DARK MODE --- */
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* --- STICKY GLASS HEADER --- */
        header { 
            position: sticky; top: 0; z-index: 100; 
            padding: 20px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        
        .search-container { position: relative; width: 350px; }
        .search-bar { 
            width: 100%; padding: 12px 24px; border-radius: 30px; 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #fff; outline: none; box-sizing: border-box; transition: all 0.3s ease; 
            font-size: 14px;
        }
        .search-bar:focus { border-color: #888; background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 15px rgba(255,255,255,0.05); }

        /* --- SECTION TITLES --- */
        .section-title { padding: 0 40px; margin: 40px 0 20px; font-size: 14px; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        /* --- CAROUSEL (FEATURED) --- */
        .carousel { display: flex; gap: 24px; padding: 0 40px 20px; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        
        /* --- GAME CARDS --- */
        .game-card { 
            flex: 0 0 auto; width: 320px; 
            background: #0a0a0a; border-radius: 16px; overflow: hidden; cursor: pointer; 
            border: 1px solid #1a1a1a; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            scroll-snap-align: start; position: relative;
        }
        .game-card:hover { transform: translateY(-8px); border-color: #444; box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
        
        .image-wrapper { position: relative; width: 100%; height: 180px; overflow: hidden; }
        .image-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .game-card:hover .image-wrapper img { transform: scale(1.05); }
        
        .play-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; 
            opacity: 0; transition: 0.3s; 
        }
        .game-card:hover .play-overlay { opacity: 1; }
        .play-btn { background: #fff; color: #000; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; padding-left: 4px; box-sizing: border-box; }

        .game-card .info { padding: 16px; }
        .game-card h3 { margin: 0; font-size: 16px; color: #fff; font-weight: 600; }

        /* --- FULL GAME GRID --- */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; padding: 0 40px 80px; }
        .grid-card { width: 100%; }
        
        /* Apply same styling to grid cards as carousel cards */
        .grid-card { background: #0a0a0a; border-radius: 16px; overflow: hidden; cursor: pointer; border: 1px solid #1a1a1a; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); position: relative; }
        .grid-card:hover { transform: translateY(-6px); border-color: #333; box-shadow: 0 10px 20px rgba(0,0,0,0.6); }
        .grid-card .image-wrapper { height: 140px; }
        .grid-card .info { padding: 14px; }
        .grid-card h3 { margin: 0; font-size: 15px; color: #fff; font-weight: 500; }

        /* --- CINEMATIC GAME PLAYER OVERLAY --- */
        #playerOverlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; }
        #gameFrame { width: 100%; height: 100%; border: none; }
        #closeBtn { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(20, 20, 20, 0.8); color: #fff; border: 1px solid rgba(255,255,255,0.1); 
            padding: 10px 20px; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: 600;
            backdrop-filter: blur(10px); transition: 0.2s; 
        }
        #closeBtn:hover { background: rgba(40, 40, 40, 0.9); border-color: #ff5252; color: #ff5252; }
        
        /* --- NO RESULTS --- */
        #noResults { display: none; text-align: center; color: #666; padding: 60px; grid-column: 1 / -1; font-size: 16px; }
    </style>
</head>
<body>

    <script src="gamedata.js"></script>

    <header>
        <h1>🎮 BaseGames</h1>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search your stash..." autocomplete="off">
        </div>
    </header>

    <div id="featuredSection">
        <div class="section-title">Featured</div>
        <div class="carousel" id="carouselContainer"></div>
    </div>

    <div class="section-title">Library</div>
    <div class="game-grid" id="gridContainer">
        <div id="noResults">No games match your search.</div>
    </div>

    <div id="playerOverlay">
        <iframe id="gameFrame" allowfullscreen></iframe>
        <button id="closeBtn">Exit Game</button>
    </div>

    <script>
        const carouselContainer = document.getElementById('carouselContainer');
        const gridContainer = document.getElementById('gridContainer');
        const searchInput = document.getElementById('searchInput');
        const playerOverlay = document.getElementById('playerOverlay');
        const gameFrame = document.getElementById('gameFrame');
        const closeBtn = document.getElementById('closeBtn');
        const featuredSection = document.getElementById('featuredSection');
        const noResults = document.getElementById('noResults');

        // --- 1. RENDER LOGIC ---
        const createCard = (game, isCarousel) => {
            const card = document.createElement('div');
            card.className = isCarousel ? 'game-card' : 'grid-card';
            
            card.innerHTML = `
                <div class="image-wrapper">
                    <img src="${game.image}" alt="${game.title}" loading="lazy">
                    <div class="play-overlay">
                        <div class="play-btn">▶</div>
                    </div>
                </div>
                <div class="info">
                    <h3>${game.title}</h3>
                </div>
            `;
            
            // Open game on click
            card.addEventListener('click', () => {
                playerOverlay.style.display = 'block';
                gameFrame.src = game.url;
            });
            return card;
        };

        const renderGames = (filterText = '') => {
            carouselContainer.innerHTML = '';
            gridContainer.innerHTML = '';
            gridContainer.appendChild(noResults); 
            
            let hasResults = false;
            const term = filterText.toLowerCase();

            gamesLibrary.forEach(game => {
                if (game.title.toLowerCase().includes(term)) {
                    hasResults = true;
                    
                    if (filterText === '') {
                        if (game.featured) {
                            carouselContainer.appendChild(createCard(game, true));
                        } else {
                            gridContainer.appendChild(createCard(game, false));
                        }
                    } else {
                        gridContainer.appendChild(createCard(game, false));
                    }
                }
            });

            // Toggle UI based on search state
            if (filterText !== '') {
                featuredSection.style.display = 'none';
            } else {
                featuredSection.style.display = 'block';
            }

            noResults.style.display = hasResults ? 'none' : 'block';
        };

        // --- 2. SEARCH EVENT ---
        searchInput.addEventListener('input', (e) => {
            renderGames(e.target.value);
        });

        // --- 3. EXIT GAME ---
        closeBtn.addEventListener('click', () => {
            playerOverlay.style.display = 'none';
            gameFrame.src = ''; // Cut audio and clear memory
        });

        // Initial Load
        renderGames();
    </script>
</body>
</html>
