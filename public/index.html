<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://ssl.gstatic.com/docs/doclist/images/infinite_drive_2022q4.ico">
    <title>My Drive - Google Drive</title>
    <style>
        /* Base Variables & Reset */
        :root {
            --bg: #0f0f0f;
            --tab-bg: #1a1a1a;
            --tab-active: #2a2a2a;
            --text: #e0e0e0;
            --accent: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Top Navigation & Tabs */
        #top-bar { display: flex; align-items: center; background: var(--tab-bg); border-bottom: 1px solid #333; padding: 0 10px; height: 50px; flex-shrink: 0; transition: margin-top 0.3s ease; }
        #tabs-container { display: flex; align-items: center; flex-grow: 1; overflow-x: auto; scrollbar-width: none; height: 100%; }
        #tabs-container::-webkit-scrollbar { display: none; }
        
        .tab { display: flex; align-items: center; justify-content: space-between; padding: 0 15px; height: 100%; min-width: 160px; max-width: 220px; background: transparent; color: #888; cursor: pointer; border-right: 1px solid #333; font-size: 14px; transition: 0.2s; user-select: none; }
        .tab:hover { background: #222; }
        
        /* The Active Tab Highlight */
        .tab.active { background: var(--tab-active); color: var(--accent); font-weight: 500; border-bottom: 3px solid var(--accent); }
        
        /* Favicon and Title Styling */
        .tab-content { display: flex; align-items: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex-grow: 1; }
        .favicon { width: 16px; height: 16px; margin-right: 8px; border-radius: 3px; display: none; background: #fff; }
        .title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .close-tab { font-size: 18px; margin-left: 10px; opacity: 0.5; padding: 0px 6px; border-radius: 4px; line-height: 1; }
        .close-tab:hover { opacity: 1; background: rgba(255,255,255,0.1); }

        #add-tab { background: transparent; border: none; color: #888; font-size: 24px; cursor: pointer; padding: 0 15px; height: 100%; transition: 0.2s; }
        #add-tab:hover { color: var(--accent); background: #222; }

        #fullscreen-btn { background: transparent; border: none; color: #888; font-size: 20px; cursor: pointer; padding: 0 15px; height: 100%; margin-left: auto; transition: 0.2s; }
        #fullscreen-btn:hover { color: var(--accent); }

        /* Viewport Area */
        #viewport { flex-grow: 1; position: relative; width: 100%; height: 100%; }
        .view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; border: none; }
        .view.active { display: flex; }

        /* Home Page View Styling */
        .home-view { align-items: center; justify-content: center; flex-direction: column; background: var(--bg); }
        .home-view h1 { font-size: 4rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 30px; }
        .search-box { display: flex; width: 100%; max-width: 600px; gap: 10px; padding: 0 20px; }
        .search-input { flex-grow: 1; padding: 16px 24px; border-radius: 30px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 16px; outline: none; transition: 0.2s; }
        .search-input:focus { border-color: #555; background: #222; }

        /* Toast Notification */
        #toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 12px 24px; border-radius: 30px; border: 1px solid #444; font-size: 14px; font-weight: 500; transition: bottom 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: none; }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div id="tabs-container"></div>
        <button id="add-tab" title="New Tab">+</button>
        <button id="fullscreen-btn" title="Fullscreen">⛶</button>
    </div>

    <div id="viewport"></div>
    <div id="toast">Press Shift+Q or Esc to exit fullscreen</div>

    <script>
        const tabsContainer = document.getElementById('tabs-container');
        const viewport = document.getElementById('viewport');
        const topBar = document.getElementById('top-bar');
        const toast = document.getElementById('toast');
        
        let tabCounter = 0;
        let tabs = [];
        let activeTabId = null;

        // --- TAB MANAGEMENT ---
        function createTab() {
            tabCounter++;
            const tabId = 'tab-' + tabCounter;
            
            const tabEl = document.createElement('div');
            tabEl.className = 'tab';
            tabEl.id = 'ui-' + tabId;
            // Added favicon image tag inside the tab content
            tabEl.innerHTML = `
                <div class="tab-content">
                    <img class="favicon" src="" alt="icon">
                    <span class="title">Home</span>
                </div>
                <span class="close-tab">×</span>
            `;
            
            tabEl.addEventListener('click', (e) => {
                if(e.target.className !== 'close-tab') switchTab(tabId);
            });
            
            tabEl.querySelector('.close-tab').addEventListener('click', () => closeTab(tabId));
            
            tabsContainer.appendChild(tabEl);

            const viewEl = document.createElement('div');
            viewEl.className = 'view home-view';
            viewEl.id = 'view-' + tabId;
            viewEl.innerHTML = `
                <h1>Base</h1>
                <form class="search-box" onsubmit="launchSearch(event, '${tabId}')">
                    <input type="text" class="search-input" placeholder="Search the web or enter URL..." autocomplete="off" required>
                </form>
            `;
            
            viewport.appendChild(viewEl);
            tabs.push(tabId);
            switchTab(tabId);
        }

        function switchTab(tabId) {
            activeTabId = tabId;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('ui-' + tabId).classList.add('active');
            
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
        }

        function closeTab(tabId) {
            document.getElementById('ui-' + tabId).remove();
            document.getElementById('view-' + tabId).remove();
            tabs = tabs.filter(t => t !== tabId);
            
            if (activeTabId === tabId) {
                if (tabs.length > 0) {
                    switchTab(tabs[tabs.length - 1]);
                } else {
                    createTab();
                }
            }
        }

        // --- PROXY LAUNCH & METADATA EXTRACTION LOGIC ---
        window.launchSearch = function(event, tabId) {
            event.preventDefault();
            const input = event.target.querySelector('.search-input').value.trim();
            const targetBase64 = encodeURIComponent(btoa(input));
            
            // 1. Determine the domain for the Favicon
            let domain = "duckduckgo.com"; // Default to search engine
            if (input.includes('.') && !input.includes(' ')) {
                try { 
                    const urlToParse = input.startsWith('http') ? input : 'https://' + input;
                    domain = new URL(urlToParse).hostname; 
                } catch(e) {}
            }

            // 2. Update UI instantly with Loading state and the logo
            const tabEl = document.getElementById('ui-' + tabId);
            const titleEl = tabEl.querySelector('.title');
            const iconEl = tabEl.querySelector('.favicon');
            
            titleEl.innerText = "Loading...";
            iconEl.src = `https://www.google.com/s2/favicons?sz=32&domain=${domain}`;
            iconEl.style.display = "block"; // Make the logo visible

            // 3. Inject the Proxy Iframe
            const viewEl = document.getElementById('view-' + tabId);
            viewEl.innerHTML = `<iframe src="/?target=${targetBase64}" style="width:100%; height:100%; border:none;" id="iframe-${tabId}"></iframe>`;
            viewEl.classList.remove('home-view');

            // 4. Listen for the iframe to finish loading to steal the true website title
            const iframe = document.getElementById('iframe-' + tabId);
            iframe.onload = () => {
                try {
                    // Because our backend proxies everything through the same domain, CORS allows this!
                    const siteTitle = iframe.contentDocument.title;
                    if (siteTitle && siteTitle.trim() !== "") {
                        titleEl.innerText = siteTitle;
                    } else {
                        titleEl.innerText = domain; // Fallback
                    }
                } catch(e) {
                    titleEl.innerText = domain; // Fallback if blocked
                }
            };
        };

        // --- FULLSCREEN LOGIC ---
        let toastTimeout;
        function showToast() {
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                showToast();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                topBar.style.display = 'none';
            } else {
                topBar.style.display = 'flex';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.key.toLowerCase() === 'q') {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                }
            }
        });

        document.getElementById('add-tab').addEventListener('click', createTab);
        createTab();
    </script>
</body>
</html>
