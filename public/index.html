<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Proxy</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15%;
        }
        input[type="url"] {
            width: 300px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h1>Prototype Proxy</h1>
    <p>Enter a URL to browse safely</p>

    <form id="proxyForm">
        <input type="url" id="targetUrl" placeholder="https://example.com" required>
        <button type="submit">Go</button>
    </form>

    <script>
        // Intercept form, grab password from current URL, and build the proxy URL
        document.getElementById('proxyForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            const url = document.getElementById('targetUrl').value;
            
            // Get the password from the address bar so we don't get locked out
            const urlParams = new URLSearchParams(window.location.search);
            const pw = urlParams.get('pw') || '';
            
            // Redirect to Vercel backend
            window.location.href = '/?pw=' + encodeURIComponent(pw) + '&target=' + encodeURIComponent(url);
        });
    </script>

</body>
</html>
